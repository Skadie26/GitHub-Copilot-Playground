<div
  class="sidebar"
  [class.collapsed]="!isMobile && isCollapsed"
  [class.open]="isMobile && isOpen"
  [class.mobile]="isMobile"
>
  <div class="sidebar-header">
    <div class="weather-icons" *ngIf="!isCollapsed || isMobile">
      <div class="weather-icon sun">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"
          />
        </svg>
      </div>
      <div class="weather-icon cloud">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"
          />
        </svg>
      </div>
      <div class="weather-icon rain">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M9.05 4.05c.29.29.29.77 0 1.06L6.83 7.34c-.29.29-.77.29-1.06 0s-.29-.77 0-1.06l2.22-2.23c.29-.29.77-.29 1.06 0zm6.08.23l-2.45 2.44c-.29.29-.29.77 0 1.06s.77.29 1.06 0l2.45-2.44c.29-.29.29-.77 0-1.06s-.77-.29-1.06 0zM4.5 10.5v-1c0-1.1.9-2 2-2s2 .9 2 2v1c0 .28.22.5.5.5s.5-.22.5-.5v-1c0-1.66-1.34-3-3-3s-3 1.34-3 3v1c0 .28.22.5.5.5s.5-.22.5-.5zm8 0v-1c0-1.1.9-2 2-2s2 .9 2 2v1c0 .28.22.5.5.5s.5-.22.5-.5v-1c0-1.66-1.34-3-3-3s-3 1.34-3 3v1c0 .28.22.5.5.5s.5-.22.5-.5z"
          />
          <path
            d="M12 16c0-1.1-.9-2-2-2s-2 .9-2 2 .9 2 2 2 2-.9 2-2zm6-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"
          />
        </svg>
      </div>
      <div class="weather-icon snow">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M22 11h-4.17l3.24-3.24-1.41-1.42L15.83 10H13V7.17l3.66-3.66-1.42-1.41L12 5.34 8.76 2.1 7.34 3.51 11 7.17V10H8.17L4.93 6.76 3.51 8.17 6.75 11.41H2v2h4.75l-3.24 3.24 1.41 1.42L8.17 14H11v2.83l-3.66 3.66 1.42 1.41L12 18.66l3.24 3.24 1.42-1.41L13 16.83V14h2.83l3.24 3.24 1.41-1.42L17.25 13H22v-2z"
          />
        </svg>
      </div>
    </div>
    <button class="toggle-btn" (click)="onToggleSidebar()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        [class.rotated]="(!isMobile && !isCollapsed) || (isMobile && isOpen)"
      >
        <path d="M10 17l5-5-5-5v10z" />
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-menu">
      <li
        *ngFor="let item of menuItems; let i = index"
        class="nav-item"
        [class.active]="item.active"
        (click)="selectMenuItem(i)"
        [title]="item.label"
      >
        <div class="nav-link">
          <div class="nav-icon">
            <svg
              *ngIf="item.icon === 'dashboard'"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"
              />
            </svg>
            <svg
              *ngIf="item.icon === 'weather'"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"
              />
            </svg>
            <svg
              *ngIf="item.icon === 'analytics'"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"
              />
            </svg>
            <svg
              *ngIf="item.icon === 'settings'"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"
              />
            </svg>
            <svg
              *ngIf="item.icon === 'notifications'"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
              />
            </svg>
          </div>
          <span
            class="nav-label"
            *ngIf="(!isMobile && !isCollapsed) || (isMobile && isOpen)"
            >{{ item.label }}</span
          >
        </div>
      </li>
    </ul>
  </nav>
</div>
